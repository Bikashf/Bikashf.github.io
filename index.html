<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bikash Kumar Bhoi - Portfolio</title>
  <meta name="description" content="Portfolio of Bikash Kumar Bhoi, MCA graduate and aspiring Python Backend Developer specializing in FastAPI and PostgreSQL." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-2: #0f141b;
      --text: #ffffff;
      --muted: #9da7b3;
      --border: #30363d;
      --accent: #00e676;
      --accent-2: #64b5f6;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      --radius: 12px;
      --container: 1180px;
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
    }

    [data-theme="light"] {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef3f8;
      --text: #111827;
      --muted: #5b6472;
      --border: #d7dde5;
      --accent: #11a85c;
      --accent-2: #2f7fd1;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; scroll-padding-top: 96px; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    button { font: inherit; }

    .page {
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(100, 181, 246, 0.08), transparent 28%),
        radial-gradient(circle at top left, rgba(0, 230, 118, 0.06), transparent 24%),
        var(--bg);
    }

    .container {
      width: min(calc(100% - 2rem), var(--container));
      margin: 0 auto;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      border-bottom: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 78px;
      gap: var(--space-4);
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0.02em;
      font-size: 1.45rem;
      color: var(--text);
      white-space: nowrap;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: var(--space-5);
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 0.96rem;
      transition: color 0.2s ease;
    }

    .nav-links a:hover,
    .nav-links a:focus-visible {
      color: var(--text);
    }

    .theme-toggle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    main {
      padding: var(--space-10) 0 var(--space-16);
    }

    .hero-card,
    .section-card,
    .project-card,
    .contact-card,
    .experience-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-card {
      display: grid;
      grid-template-columns: 1.25fr 0.95fr;
      gap: var(--space-8);
      padding: clamp(1.5rem, 4vw, 3rem);
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--muted);
      font-size: 0.86rem;
      margin-bottom: var(--space-5);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .hero h1 .accent-line {
      display: block;
      color: var(--accent);
    }

    .hero p {
      margin: var(--space-5) 0 0;
      color: var(--muted);
      max-width: 58ch;
      font-size: 1rem;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-4);
      margin-top: var(--space-6);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      min-height: 46px;
      padding: 0.8rem 1.15rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
    }

    .btn-accent {
      border-color: color-mix(in srgb, var(--accent) 65%, var(--border));
      color: var(--accent);
    }

    .btn-dark {
      background: transparent;
      color: var(--text);
    }

    .hero-visual {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 100%;
    }

    .visual-stack {
      display: grid;
      gap: var(--space-6);
      justify-items: center;
      width: 100%;
    }

    .profile-photo-wrap {
      width: min(220px, 72vw);
      aspect-ratio: 1;
      padding: 6px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8b5cf6, #64b5f6, #00e676);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 20px 40px rgba(0,0,0,0.28);
    }

    .profile-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 8px solid var(--surface);
      background: var(--surface-2);
    }

    .role-ring {
      width: min(300px, 84vw);
      aspect-ratio: 1;
      border-radius: 50%;
      padding: 8px;
      background: conic-gradient(from 180deg, #8b5cf6, #64b5f6, #00e676, #8b5cf6);
      display: grid;
      place-items: center;
      position: relative;
    }

    .role-ring::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .role-center {
      width: 78%;
      height: 78%;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: var(--space-4);
      z-index: 1;
    }

    .role-center span:first-child {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .role-center strong {
      font-size: 1.2rem;
      max-width: 10ch;
      line-height: 1.25;
    }

    section {
      padding-top: var(--space-16);
    }

    .section-heading {
      font-size: 1.9rem;
      font-weight: 800;
      margin: 0 0 var(--space-6);
      letter-spacing: -0.03em;
    }

    .skills-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
    }

    .skill-chip {
      padding: 0.72rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
    }

    .experience-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-6);
    }

    .experience-card,
    .project-card,
    .contact-card,
    .section-card {
      padding: var(--space-6);
    }

    .experience-card h3,
    .project-header h3 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
    }

    .meta {
      color: var(--muted);
      font-size: 0.94rem;
      margin-top: 0.35rem;
    }

    .bullet-list {
      list-style: none;
      padding: 0;
      margin: var(--space-5) 0 0;
      display: grid;
      gap: 0.8rem;
    }

    .bullet-list li {
      position: relative;
      padding-left: 1.2rem;
      color: var(--text);
    }

    .bullet-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.68rem;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }

    .projects-stack {
      display: grid;
      gap: var(--space-6);
    }

    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-4);
      flex-wrap: wrap;
    }

    .store-links {
      display: flex;
      gap: var(--space-4);
      flex-wrap: wrap;
    }

    .store-link {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .store-link.play { color: var(--accent); }
    .store-link.app { color: var(--accent-2); }

    .contact-grid {
      display: grid;
      gap: var(--space-4);
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--text);
      flex-wrap: wrap;
    }

    .contact-item a {
      color: var(--accent-2);
    }

    .contact-item span.label {
      font-weight: 600;
      min-width: 76px;
    }

    .footer-note {
      margin-top: var(--space-10);
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
    }

    @media (max-width: 980px) {
      .hero-card {
        grid-template-columns: 1fr;
      }

      .experience-grid {
        grid-template-columns: 1fr;
      }

      .hero-visual {
        order: -1;
      }
    }

    @media (max-width: 720px) {
      .nav-inner {
        align-items: flex-start;
        flex-direction: column;
        padding: 1rem 0;
      }

      .nav-right {
        width: 100%;
        justify-content: space-between;
      }

      .nav-links {
        gap: 1rem;
      }

      .hero-card,
      .experience-card,
      .project-card,
      .contact-card,
      .section-card {
        padding: 1.15rem;
      }

      .section-heading {
        font-size: 1.55rem;
      }

      .hero h1 {
        font-size: clamp(2rem, 9vw, 3rem);
      }

      .project-header {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const portfolioData = {
      name: 'Bikash Kumar Bhoi',
      role: 'Python Backend Developer',
      yearsExperience: '1+ Years Experience',
      location: 'Bhubaneswar, India',
      phone: '+91-7008188559',
      email: 'bikashkumarbhoi@gmail.com',
      cvFile: 'Bikash-Kumar-Bhoi-06-06-2026-Resume.pdf',
      profileImage: './assets/bikash-photo.jpg',
      headlineLineOne: 'Building scalable backend systems',
      headlineLineTwo: 'with FastAPI and PostgreSQL',
      summary: 'MCA graduate and aspiring Python Backend Developer focused on REST APIs, clean database design, JWT authentication, and maintainable full-stack solutions for modern startup teams.',
      about: 'I enjoy building practical backend systems with clean architecture, validated APIs, and reliable database design. My work combines Python development, API testing, and structured problem-solving with a strong interest in ownership-driven product teams.',
      skills: [
        'Python', 'FastAPI', 'Flask', 'Django', 'PostgreSQL', 'MongoDB', 'REST APIs', 'JWT Authentication',
        'CRUD Operations', 'SQL Joins', 'Database Normalization', 'React.js', 'JavaScript', 'HTML5', 'CSS3',
        'Git', 'GitHub', 'Postman', 'VS Code', 'DSA', 'DBMS', 'Operating Systems', 'Computer Networks'
      ],
      experiences: [
        {
          title: 'Python Developer Intern',
          company: 'OpenTechz Solutions',
          date: 'Jun 2024 – Sep 2024',
          points: [
            'Developed 5+ Python automation scripts for structured data processing and reporting workflows, reducing repetitive manual effort.',
            'Performed data cleaning, transformation, and validation to improve reporting accuracy and reliability.',
            'Optimized and debugged Python scripts to improve execution speed, stability, and failure handling.',
            'Used Git and GitHub for version control and collaborative development with a clean code history.'
          ]
        },
        {
          title: 'MCA Graduate',
          company: 'Biju Pattanaik University of Technology',
          date: '2023 – 2025 | CGPA: 8.11',
          points: [
            'Built backend-focused academic and personal projects using FastAPI and PostgreSQL.',
            'Strengthened core fundamentals across DBMS, operating systems, computer networks, and DSA.',
            'Worked on API design, schema planning, testing workflows, and modular project organization.',
            'Prepared for entry-level backend engineering roles with a startup-friendly, hands-on approach.'
          ]
        }
      ],
      projects: [
        {
          name: 'Hospital Management System',
          playStore: '#',
          appStore: '#',
          points: [
            'Built 10+ REST API endpoints to manage patients, doctors, and appointments with full CRUD operations and request validation.',
            'Designed 5+ normalized PostgreSQL tables with proper relationships and optimized SQL query handling.',
            'Implemented JWT-based authentication to secure sensitive routes and protect access to backend resources.',
            'Structured routes and models for maintainable, scalable backend architecture and tested 15+ API scenarios using Postman.'
          ]
        },
        {
          name: 'E-Commerce Backend API',
          playStore: '#',
          appStore: '#',
          points: [
            'Developed REST APIs for product, order, and user management modules using Python and FastAPI.',
            'Implemented pagination and filtering logic to improve API response handling for larger data sets.',
            'Used SQL joins and relational queries for transaction-oriented backend operations.',
            'Applied modular backend design principles to support scalability and cleaner code organization.'
          ]
        }
      ],
      socialLinks: {
        linkedin: '#',
        github: '#',
        portfolio: '#'
      }
    };

    const IconSun = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"></circle>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
      </svg>
    );

    const IconMoon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    );

    const EyeIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
    );

    const DownloadIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <path d="M7 10l5 5 5-5"></path>
        <path d="M12 15V3"></path>
      </svg>
    );

    const PlayIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>
    );

    const AppleIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16.37 1.43c0 1.14-.42 2.19-1.12 2.99-.77.87-2.02 1.54-3.1 1.45-.14-1.09.41-2.22 1.09-2.95.76-.84 2.08-1.44 3.13-1.49zM20.67 17.02c-.53 1.21-.78 1.75-1.46 2.8-.95 1.47-2.29 3.29-3.95 3.31-1.48.02-1.86-.96-3.86-.95-2 .01-2.42.97-3.91.95-1.66-.02-2.93-1.66-3.88-3.13-2.66-4.1-2.94-8.91-1.3-11.42 1.17-1.8 3.03-2.86 4.78-2.86 1.78 0 2.9.98 4.37.98 1.43 0 2.3-.98 4.36-.98 1.56 0 3.2.85 4.37 2.31-3.85 2.11-3.23 7.63.48 9.99z"></path></svg>
    );

    function App() {
      const [theme, setTheme] = React.useState('dark');

      React.useEffect(() => {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const nextTheme = prefersDark ? 'dark' : 'light';
        setTheme(nextTheme);
        document.documentElement.setAttribute('data-theme', nextTheme);
      }, []);

      const toggleTheme = () => {
        const nextTheme = theme === 'dark' ? 'light' : 'dark';
        setTheme(nextTheme);
        document.documentElement.setAttribute('data-theme', nextTheme);
      };

      return (
        <div className="page">
          <a href="#about" className="sr-only">Skip to content</a>

          <header className="navbar">
            <div className="container nav-inner">
              <a href="#hero" className="brand">{portfolioData.name}</a>
              <div className="nav-right">
                <nav className="nav-links" aria-label="Primary navigation">
                  <a href="#about">About</a>
                  <a href="#experience">Experience</a>
                  <a href="#projects">Projects</a>
                  <a href="#contact">Contact</a>
                </nav>
                <button
                  className="theme-toggle"
                  onClick={toggleTheme}
                  aria-label={`Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`}
                  type="button"
                >
                  {theme === 'dark' ? <IconSun /> : <IconMoon />}
                </button>
              </div>
            </div>
          </header>

          <main className="container">
            <section id="hero">
              <div className="hero-card">
                <div className="hero">
                  <div className="badge">{portfolioData.role} • {portfolioData.yearsExperience}</div>
                  <h1>
                    {portfolioData.headlineLineOne}
                    <span className="accent-line">{portfolioData.headlineLineTwo}</span>
                  </h1>
                  <p>{portfolioData.summary}</p>
                  <div className="hero-actions">
                    <a href="#projects" className="btn btn-accent"><EyeIcon /> View Projects</a>
                    <a href={portfolioData.cvFile} className="btn btn-dark" download target="_blank" rel="noopener noreferrer"><DownloadIcon /> Download CV</a>
                  </div>
                </div>

                <div className="hero-visual" aria-label="Profile and role graphic">
                  <div className="visual-stack">

            </section>

            <section id="about">
              <h2 className="section-heading">Skills</h2>
              <div className="section-card">
                <p style={{ marginTop: 0, marginBottom: '1.25rem', color: 'var(--muted)' }}>{portfolioData.about}</p>
                <div className="skills-wrap">
                  {portfolioData.skills.map((skill) => (
                    <span key={skill} className="skill-chip">{skill}</span>
                  ))}
                </div>
              </div>
            </section>

            <section id="experience">
              <h2 className="section-heading">Experience</h2>
              <div className="experience-grid">
                {portfolioData.experiences.map((experience) => (
                  <article key={experience.title} className="experience-card">
                    <h3>{experience.title}</h3>
                    <div className="meta">{experience.company} • {experience.date}</div>
                    <ul className="bullet-list">
                      {experience.points.map((point) => (
                        <li key={point}>{point}</li>
                      ))}
                    </ul>
                  </article>
                ))}
              </div>
            </section>

            <section id="projects">
              <h2 className="section-heading">Project</h2>
              <div className="projects-stack">
                {portfolioData.projects.map((project) => (
                  <article key={project.name} className="project-card">
                    <div className="project-header">
                      <div>
                        <h3>{project.name}</h3>
                      </div>
                    </div>
                    <ul className="bullet-list">
                      {project.points.map((point) => (
                        <li key={point}>{point}</li>
                      ))}
                    </ul>
                  </article>
                ))}
              </div>
            </section>

            <section id="contact">
              <h2 className="section-heading">Contact</h2>
              <div className="contact-card">
                <div className="contact-grid">
                  <div className="contact-item">
                    <span aria-hidden="true">📧</span>
                    <span className="label">Email</span>
                    <a href={`mailto:${portfolioData.email}`}>{portfolioData.email}</a>
                  </div>
                  <div className="contact-item">
                    <span aria-hidden="true">📞</span>
                    <span className="label">Phone</span>
                    <a href={`tel:${portfolioData.phone.replace(/[^\d+]/g, '')}`}>{portfolioData.phone}</a>
                  </div>
                  <div className="contact-item">
                    <span aria-hidden="true">📍</span>
                    <span className="label">Location</span>
                    <span>{portfolioData.location}</span>
                  </div>
                  <div className="contact-item">
                    <span aria-hidden="true">🔗</span>
                    <span className="label">Profiles</span>
                    <a href={portfolioData.socialLinks.linkedin} target="_blank" rel="noopener noreferrer">LinkedIn</a>
                    <span style={{ color: 'var(--muted)' }}>•</span>
                    <a href={portfolioData.socialLinks.github} target="_blank" rel="noopener noreferrer">GitHub</a>
                    <span style={{ color: 'var(--muted)' }}>•</span>
                    <a href={portfolioData.socialLinks.portfolio} target="_blank" rel="noopener noreferrer">Portfolio</a>
                  </div>
                </div>
              </div>

              <p className="footer-note">Built with React and plain CSS for a clean, editable single-page portfolio.</p>
